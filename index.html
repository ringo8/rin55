<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ポップシューティングゲーム</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  body { margin:0; overflow:hidden; font-family:'Press Start 2P', cursive; background:linear-gradient(#87CEFA,#ffb6c1);} 
  canvas{display:block;}
  #logo{font-size:36px;font-weight:bold;background:linear-gradient(90deg,#ff69b4,#ffd700,#00ffff);-webkit-background-clip:text;color:transparent;text-shadow:2px 2px 8px rgba(0,0,0,0.3);margin-bottom:10px;}
  #startScreen,#gameOver,#rankingScreen{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:white;text-align:center;}
  #ui{position:absolute;top:10px;left:10px;color:white;font-size:14px;display:none;}
  #controls{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);color:white;font-size:12px;background:rgba(0,0,0,0.3);padding:8px;border-radius:10px;display:none;}
  button{margin-top:10px;padding:10px 20px;font-size:14px;border:none;border-radius:10px;background:#ff69b4;color:white;font-family:'Press Start 2P';}
  input{padding:8px;border-radius:8px;border:none;margin-top:10px;font-family:'Press Start 2P';}
  .highlight{color:yellow; font-size:18px;}
</style>
</head>
<body>

<div id="startScreen">
  <div id="logo">ポップシューティングゲーム</div>
  <button onclick="startGame()">スタート</button>
</div>

<div id="ui">スコア: <span id="score">0</span><br>HP: <span id="hp">100</span></div>
<div id="controls">← →：移動 / スペース：発射（長押しで必殺技）</div>

<div id="gameOver" style="display:none;">
  ゲームオーバー<br>
  <input id="playerName" placeholder="NAME">
  <br>
  <button onclick="saveScore()">登録</button>
</div>

<div id="rankingScreen" style="display:none;">
  <h2>ランキング</h2>
  <div id="rankingList"></div>
  <button onclick="restart()">もう一回</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let player,score=0,hp=100,running;
let rankings = JSON.parse(localStorage.getItem("rankings")||"[]");
let lastRankIndex = -1;

function startGame(){
  document.getElementById("startScreen").style.display="none";
  document.getElementById("ui").style.display="block";
  document.getElementById("controls").style.display="block";
  init();update();
}

function init(){
  player={x:canvas.width/2,y:canvas.height-100};
  score=0;hp=100;running=true;
  document.getElementById("score").textContent=score;
  document.getElementById("hp").textContent=hp;
  document.getElementById("gameOver").style.display="none";
  document.getElementById("rankingScreen").style.display="none";
}

function update(){
  if(!running)return;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.font="40px serif";
  ctx.textAlign="center";
  ctx.fillText("🍎",player.x,player.y);
  requestAnimationFrame(update);
}

function gameOver(){
  running=false;
  document.getElementById("gameOver").style.display="block";
}

function saveScore(){
  const name=document.getElementById("playerName").value || "NO NAME";
  rankings.push({name,score});
  rankings.sort((a,b)=>b.score-a.score);

  lastRankIndex = rankings.findIndex(r=>r.name===name && r.score===score);

  rankings=rankings.slice(0,5);
  localStorage.setItem("rankings",JSON.stringify(rankings));
  showRanking();
}

function showRanking(){
  document.getElementById("gameOver").style.display="none";
  document.getElementById("rankingScreen").style.display="block";
  const list=document.getElementById("rankingList");

  list.innerHTML = rankings.map((r,i)=>{
    const isMe = i === lastRankIndex;
    return `<div class="${isMe ? 'highlight' : ''}">${i+1}位：${r.name} - ${r.score}${isMe ? ' ← YOU!' : ''}</div>`;
  }).join("");
}

function restart(){location.reload();}

</script>
</body>
</html>
