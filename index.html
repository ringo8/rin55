<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ポップシューティングゲーム</title>
<style>
  body { margin:0; overflow:hidden; font-family:sans-serif; background:linear-gradient(#87CEFA,#ffb6c1);} 
  canvas{display:block;}
  #logo{font-size:36px;font-weight:bold;background:linear-gradient(90deg,#ff69b4,#ffd700,#00ffff);-webkit-background-clip:text;color:transparent;text-shadow:2px 2px 8px rgba(0,0,0,0.3);margin-bottom:10px;}
  #startScreen,#gameOver{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:white;text-align:center;}
  #ui{position:absolute;top:10px;left:10px;color:white;font-size:18px;display:none;}
  #controls{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);color:white;font-size:14px;background:rgba(0,0,0,0.3);padding:8px;border-radius:10px;display:none;}
  button{margin-top:10px;padding:10px 20px;font-size:18px;border:none;border-radius:10px;background:#ff69b4;color:white;}
</style>
</head>
<body>

<div id="startScreen">
  <div id="logo">ポップシューティングゲーム</div>
  <button onclick="startGame()">スタート</button>
</div>

<div id="ui">スコア: <span id="score">0</span><br>HP: <span id="hp">5</span></div>
<div id="controls">← →：移動 / スペース：発射（長押しで必殺技）</div>

<div id="gameOver" style="display:none;">ゲームオーバー<br><button onclick="restart()">もう一回</button></div>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let player,bullets,enemies,effects,score,hp,running;
let leftPressed=false,rightPressed=false;
let spacePressed=false;
let charge=0;
let spawnRate=1000;
let enemyTimer;

const enemyTypes=[
  {type:"🦖",hp:1},
  {type:"🦕",hp:2},
  {type:"🐲",hp:3},
  {type:"👾",hp:2}
];

const specialTargets=["🐲","👾"];

function startGame(){
  document.getElementById("startScreen").style.display="none";
  document.getElementById("ui").style.display="block";
  document.getElementById("controls").style.display="block";
  init();update();startSpawning();
}

function init(){
  player={x:canvas.width/2,y:canvas.height-100,size:30,speed:6};
  bullets=[];enemies=[];effects=[];score=0;hp=5;running=true;
  charge=0;
  document.getElementById("score").textContent=score;
  document.getElementById("hp").textContent=hp;
  document.getElementById("gameOver").style.display="none";
}

function startSpawning(){
  clearInterval(enemyTimer);
  enemyTimer=setInterval(()=>{
    if(!running)return;
    const eType=enemyTypes[Math.floor(Math.random()*enemyTypes.length)];
    enemies.push({x:Math.random()*canvas.width,y:-20,size:30,speed:2+Math.random()*3,type:eType.type,hp:eType.hp});
  },spawnRate);

  setInterval(()=>{
    if(spawnRate>300){spawnRate-=100;startSpawning();}
  },5000);
}

function update(){
  if(!running)return;
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(leftPressed)player.x-=player.speed;
  if(rightPressed)player.x+=player.speed;
  player.x=Math.max(player.size,Math.min(canvas.width-player.size,player.x));

  ctx.font="40px serif";
  ctx.textAlign="center";
  ctx.fillText("🍎",player.x,player.y);

  if(spacePressed)charge++;

  // bullets
  ctx.fillStyle="white";
  bullets.forEach((b,i)=>{
    b.y-=6;
    ctx.fillRect(b.x-2,b.y,4,10);
    if(b.y<0)bullets.splice(i,1);
  });

  // enemies
  enemies.forEach((e,ei)=>{
    e.y+=e.speed;
    ctx.font="40px serif";
    ctx.fillText(e.type,e.x,e.y);

    bullets.forEach((b,bi)=>{
      let dx=e.x-b.x,dy=e.y-b.y;
      if(Math.sqrt(dx*dx+dy*dy)<e.size){
        e.hp--;
        bullets.splice(bi,1);
        if(e.hp<=0){
          enemies.splice(ei,1);
          score++;
          effects.push({x:e.x,y:e.y,text:"✨+1",life:30});
          document.getElementById("score").textContent=score;
        }
      }
    });

    let dx=e.x-player.x,dy=e.y-player.y;
    if(Math.sqrt(dx*dx+dy*dy)<e.size+player.size){
      enemies.splice(ei,1);hp--;
      document.getElementById("hp").textContent=hp;
      if(hp<=0)gameOver();
    }

    if(e.y>canvas.height){
      enemies.splice(ei,1);hp--;
      document.getElementById("hp").textContent=hp;
      if(hp<=0)gameOver();
    }
  });

  // effects
  effects.forEach((ef,i)=>{
    ef.y-=1;
    ef.life--;
    ctx.fillStyle="yellow";
    ctx.fillText(ef.text,ef.x,ef.y);
    if(ef.life<=0)effects.splice(i,1);
  });

  requestAnimationFrame(update);
}

function gameOver(){running=false;document.getElementById("gameOver").style.display="block";}
function restart(){startGame();}

window.addEventListener("keydown",e=>{
  if(e.code==="ArrowLeft")leftPressed=true;
  if(e.code==="ArrowRight")rightPressed=true;
  if(e.code==="Space")spacePressed=true;
});

window.addEventListener("keyup",e=>{
  if(e.code==="ArrowLeft")leftPressed=false;
  if(e.code==="ArrowRight")rightPressed=false;

  if(e.code==="Space"){
    spacePressed=false;
    if(charge>20){
      let removed=0;
      enemies=enemies.filter(e=>{
        if(specialTargets.includes(e.type)){
          effects.push({x:e.x,y:e.y,text:"✨+100",life:40});
          removed++;
          return false;
        }
        return true;
      });
      score+=100;
      document.getElementById("score").textContent=score;
    }else{
      bullets.push({x:player.x,y:player.y});
    }
    charge=0;
  }
});

canvas.addEventListener("touchmove",e=>{player.x=e.touches[0].clientX;});
canvas.addEventListener("touchstart",()=>{bullets.push({x:player.x,y:player.y});});

</script>
</body>
</html>
